# AppProject for Helm-based addons sourced from public ingress-nginx chart repo.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: Git-managed ingress-nginx (hub and spoke) via ApplicationSet
  sourceRepos:
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

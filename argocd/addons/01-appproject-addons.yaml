# AppProject for cluster addons installed from public Helm repos (e.g. External Secrets).
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: Cluster addons (External Secrets Operator, etc.) via ApplicationSet
  sourceRepos:
    - https://charts.external-secrets.io
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

# External Secrets Operator on hub and spoke — cluster Secrets must include
# enable_external_secrets_operator=true (from Terraform addons in tfvars).
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets-clusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_external_secrets_operator: "true"
  template:
    metadata:
      name: 'external-secrets-{{ .name | trunc 48 }}'
      labels:
        appset: external-secrets-clusters
        cluster: '{{ .name }}'
    spec:
      project: addons
      source:
        repoURL: https://charts.external-secrets.io
        chart: external-secrets
        targetRevision: 0.19.2
        helm:
          values: |
            installCRDs: true
      destination:
        name: '{{ .name }}'
        namespace: external-secrets-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

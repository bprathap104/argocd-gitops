# Installs ingress-nginx on every registered cluster whose Secret has
# enable_ingress_nginx=true (hub and spoke). Disable Terraform helm_release for
# ingress on the hub (ingress_nginx_terraform_install=false) to avoid two owners.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx-clusters
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_ingress_nginx: "true"
  template:
    metadata:
      name: 'ingress-nginx-{{ .name | trunc 48 }}'
      labels:
        appset: ingress-nginx-clusters
        cluster: '{{ .name }}'
    spec:
      project: platform
      source:
        repoURL: https://kubernetes.github.io/ingress-nginx
        chart: ingress-nginx
        targetRevision: 4.12.1
        helm:
          releaseName: ingress-nginx
          parameters:
            - name: controller.service.annotations.service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path
              value: /healthz
      destination:
        name: '{{ .name }}'
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

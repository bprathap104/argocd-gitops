# Hub: ingress-nginx is installed once by 02_bootstrap (Terraform helm_release) in namespace
# ingress-nginx — avoids needing a controller before Argo can sync.
# Spoke: same chart is installed by Argo only (this ApplicationSet), same namespace/release
# naming as the hub defaults for consistency.
#
# Cluster Secret labels (Terraform addons in tfvars):
#   cluster_role: hub | spoke
#   enable_ingress_nginx: "true" on spoke — selects clusters for Git-managed ingress (hub uses TF for controller)
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  description: Git-managed ingress on spokes; hub ingress stays on Terraform
  sourceRepos:
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx-spokes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster_role: spoke
            enable_ingress_nginx: "true"
  template:
    metadata:
      name: 'ingress-nginx-{{ .name | trunc 48 }}'
      labels:
        appset: ingress-nginx-spokes
        cluster: '{{ .name }}'
    spec:
      project: platform
      source:
        repoURL: https://kubernetes.github.io/ingress-nginx
        chart: ingress-nginx
        targetRevision: 4.12.1
        helm:
          releaseName: ingress-nginx
          parameters:
            - name: controller.service.annotations.service\.beta\.kubernetes\.io/azure-load-balancer-health-probe-request-path
              value: /healthz
      destination:
        name: '{{ .name }}'
        namespace: ingress-nginx
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
